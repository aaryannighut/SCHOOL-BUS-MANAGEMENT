<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="forgotpassword.css">
    <link rel="shortcut icon" href="https://img.icons8.com/?size=100&id=DCVzwScSnIKl&format=png&color=000000" type="image/x-icon">
</head>
<body>
    <div class="container">
        <h2><center>Forgot Password</center></h2>
        <form id="forgotPasswordForm">
            <label for="email" >Email:</label>
            <input type="email" id="email" name="email" required>
            <button type="submit" class="reset">Reset Password</button>
        </form>
        <p id="responseMessage"></p>
    </div>
    <script src="forgotpassword.js"></script>
</body>
</html>
